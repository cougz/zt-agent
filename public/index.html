<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zero Trust Agent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace;
      background: #0b0e14;
      color: #e2e8f0;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      background: #0f1522;
      border-bottom: 1px solid #1e2a3a;
      flex-shrink: 0;
    }
    header svg { width: 28px; height: 28px; flex-shrink: 0; }
    header h1 { font-size: 15px; font-weight: 600; color: #f6f6ef; }
    #ws-status {
      font-size: 11px;
      color: #64748b;
      margin-left: auto;
      padding: 3px 8px;
      border-radius: 4px;
      background: #1a2236;
    }
    #ws-status.connected { color: #22c55e; }
    #ws-status.error    { color: #ef4444; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .msg-wrap { max-width: 820px; width: 100%; margin: 0 auto; }

    .role-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 5px;
      color: #475569;
    }
    .msg-wrap.user  .role-label { text-align: right; color: #475569; }
    .msg-wrap.agent .role-label { color: #f97316; }
    .msg-wrap.tool  .role-label { color: #3b82f6; }

    .bubble {
      padding: 12px 16px;
      border-radius: 8px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 14px;
    }
    .msg-wrap.user  .bubble { background: #1a2742; border: 1px solid #1e3a5f; max-width: 72%; margin-left: auto; }
    .msg-wrap.agent .bubble { background: #111827; border: 1px solid #1e2a3a; }
    .msg-wrap.tool  .bubble { background: #0a1628; border: 1px dashed #1e3a5f; font-family: "Courier New", monospace; font-size: 12px; color: #64748b; }

    #input-area {
      padding: 16px 20px;
      background: #0f1522;
      border-top: 1px solid #1e2a3a;
      flex-shrink: 0;
    }
    #form { display: flex; gap: 10px; max-width: 820px; margin: 0 auto; }

    #input {
      flex: 1;
      background: #1a2236;
      border: 1px solid #1e3a5f;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      resize: none;
      min-height: 42px;
      max-height: 160px;
      font-family: inherit;
    }
    #input:focus { border-color: #3b82f6; }
    #input::placeholder { color: #475569; }

    #send {
      background: #f97316;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      padding: 10px 20px;
      cursor: pointer;
      transition: background 0.15s;
    }
    #send:hover    { background: #ea6c0a; }
    #send:disabled { background: #374151; cursor: not-allowed; }

    #status { font-size: 11px; color: #f97316; text-align: center; margin-top: 8px; min-height: 16px; }
  </style>
</head>
<body>

<header>
  <svg viewBox="0 0 109 41" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M73.536 33.486c.44 0 .793-.354.793-.793v-2.97a.793.793 0 0 0-.793-.793H64.4v-3.983h9.136c.44 0 .793-.354.793-.793v-2.97a.793.793 0 0 0-.793-.793H64.4v-3.724h9.136c.44 0 .793-.354.793-.793v-2.97a.793.793 0 0 0-.793-.793H60.635a.793.793 0 0 0-.793.793v19.79c0 .44.354.793.793.793h12.9ZM36.73 13.696a.793.793 0 0 0-.793.793v11.55L28.6 14.138a.793.793 0 0 0-.66-.442h-3.622a.793.793 0 0 0-.793.793v19.79c0 .44.354.793.793.793h3.763c.44 0 .793-.354.793-.793V22.727l7.338 11.903a.793.793 0 0 0 .66.442h3.621c.44 0 .793-.354.793-.793V14.49a.793.793 0 0 0-.793-.793H36.73Z" fill="#F6821F"/>
    <path d="M83.386 33.486h3.763a.793.793 0 0 0 .793-.793V14.49a.793.793 0 0 0-.793-.793h-3.763a.793.793 0 0 0-.793.793v18.203c0 .44.354.793.793.793Z" fill="#F6821F"/>
    <path d="M47.02 33.486h13.407c.44 0 .793-.354.793-.793V29.72a.793.793 0 0 0-.793-.793H51.576V14.49a.793.793 0 0 0-.793-.793h-3.763a.793.793 0 0 0-.793.793v18.203c0 .44.354.793.793.793Z" fill="#F6821F"/>
    <path fill-rule="evenodd" clip-rule="evenodd" d="M19.413 26.03c.276-1.026.17-1.974-.306-2.685-.43-.647-1.13-1.017-1.971-1.04l-12.84-.163a.253.253 0 0 1-.209-.11.253.253 0 0 1-.025-.234c.048-.113.163-.19.29-.2l12.961-.164c1.535-.072 3.2-1.302 3.78-2.8l.739-1.927a.26.26 0 0 0 .014-.16C20.835 11.1 16.278 7.5 10.87 7.5 5.98 7.5 1.853 10.55.514 14.8c-.43-.32-.977-.5-1.564-.483-1.134.033-2.048.98-2.05 2.115a2.14 2.14 0 0 0 .245.997C-4.526 17.56-6 19.338-6 21.453c0 2.375 1.925 4.3 4.3 4.3H18.8c.27 0 .515-.176.613-.44l.001-.004Z" fill="#FBAD41"/>
  </svg>
  <h1>Zero Trust Agent</h1>
  <span id="ws-status">connecting</span>
</header>

<div id="messages">
  <div class="msg-wrap agent">
    <div class="role-label">Zero Trust Agent</div>
    <div class="bubble">Hello! I can help you manage your Cloudflare Zero Trust environment. Try asking:

- "List all my Access applications"
- "Show me blocked Gateway requests in the last hour"
- "What tunnels do I have and what's their status?"
- "List enrolled WARP devices"</div>
  </div>
</div>

<div id="input-area">
  <form id="form">
    <textarea id="input" placeholder="Ask about your Zero Trust environment…" rows="1"></textarea>
    <button id="send" type="submit">Send</button>
  </form>
  <div id="status"></div>
</div>

<script>
  // ── DOM refs ────────────────────────────────────────────────────────────────
  const messagesEl = document.getElementById('messages');
  const form       = document.getElementById('form');
  const inputEl    = document.getElementById('input');
  const sendBtn    = document.getElementById('send');
  const statusEl   = document.getElementById('status');
  const wsStatusEl = document.getElementById('ws-status');

  // ── Agent WebSocket URL ─────────────────────────────────────────────────────
  // AIChatAgent route: /agents/{kebab-class-name}/{instance-id}
  // ZeroTrustAgent → zero-trust-agent
  const sessionId = 'session-' + Math.random().toString(36).slice(2, 10);
  const proto     = location.protocol === 'https:' ? 'wss' : 'ws';
  const wsUrl     = `${proto}://${location.host}/agents/zero-trust-agent/${sessionId}`;

  // ── State ───────────────────────────────────────────────────────────────────
  let ws              = null;
  let reconnectTimer  = null;
  let streaming       = false;
  let currentReqId    = null;
  let currentBubble   = null;  // live-updating <div class="bubble"> for the active stream
  let currentText     = '';

  // ── UI helpers ──────────────────────────────────────────────────────────────
  function setStatus(text) { statusEl.textContent = text; }

  function setWsStatus(label, cls) {
    wsStatusEl.textContent = label;
    wsStatusEl.className   = cls || '';
  }

  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function appendBubble(role, label, text) {
    const wrap  = document.createElement('div');
    wrap.className = `msg-wrap ${role}`;
    const lbl   = document.createElement('div');
    lbl.className  = 'role-label';
    lbl.textContent = label;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    wrap.appendChild(lbl);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    scrollBottom();
    return bubble;
  }

  function startAgentBubble() {
    currentText   = '';
    currentBubble = appendBubble('agent', 'Zero Trust Agent', '');
    return currentBubble;
  }

  function appendToolBubble(name, argsOrResult) {
    const text = typeof argsOrResult === 'string'
      ? argsOrResult
      : JSON.stringify(argsOrResult, null, 2);
    appendBubble('tool', `Tool: ${name}`, text);
  }

  // ── AI SDK UI message stream parser (ai v6 object format) ──────────────────
  // @cloudflare/ai-chat v0.8 sends cf_agent_use_chat_response with body
  // containing newline-delimited JSON objects from toUIMessageStreamResponse().
  // Each object has a `type` field.
  let streamBuffer = '';
  let activeToolName = null;

  function processStreamChunk(chunk) {
    streamBuffer += chunk;
    const lines = streamBuffer.split('\n');
    streamBuffer = lines.pop(); // keep incomplete last line

    for (const line of lines) {
      if (!line.trim()) continue;
      let evt;
      try { evt = JSON.parse(line); } catch { continue; }

      switch (evt.type) {
        case 'start':
          // New assistant turn starting — open a fresh bubble
          currentText   = '';
          currentBubble = null;
          break;

        case 'text-start':
          if (!currentBubble) startAgentBubble();
          break;

        case 'text-delta':
          if (!currentBubble) startAgentBubble();
          currentText += evt.delta || '';
          currentBubble.textContent = currentText;
          scrollBottom();
          break;

        case 'text-end':
          break;

        case 'tool-call':   // non-streaming: full call in one event
        case 'tool-input-available':
          activeToolName = evt.toolName || evt.tool_name || 'tool';
          appendToolBubble(activeToolName, evt.input ?? evt.args ?? {});
          break;

        case 'tool-result':
          {
            const lastTool = messagesEl.querySelector('.msg-wrap.tool:last-child .bubble');
            if (lastTool) {
              const result = JSON.stringify(evt.result ?? evt, null, 2);
              lastTool.textContent += '\n\n→ ' + result.slice(0, 1400)
                + (result.length > 1400 ? '\n…(truncated)' : '');
            }
          }
          break;

        case 'finish-step':
          break;

        case 'finish':
          finishStream();
          break;

        case 'error':
          if (!currentBubble) startAgentBubble();
          currentBubble.textContent = 'Error: ' + (evt.errorMessage || evt.message || JSON.stringify(evt));
          finishStream();
          break;
      }
    }
  }

  function finishStream() {
    streaming     = false;
    currentReqId  = null;
    currentBubble = null;
    currentText   = '';
    streamBuffer  = '';
    sendBtn.disabled = false;
    setStatus('');
  }

  // ── WebSocket ───────────────────────────────────────────────────────────────
  function connect() {
    clearTimeout(reconnectTimer);
    ws = new WebSocket(wsUrl);

    ws.addEventListener('open', () => {
      setWsStatus('connected', 'connected');
    });

    ws.addEventListener('close', () => {
      setWsStatus('reconnecting…');
      if (streaming) finishStream();
      reconnectTimer = setTimeout(connect, 3000);
    });

    ws.addEventListener('error', () => {
      setWsStatus('error', 'error');
    });

    ws.addEventListener('message', (event) => {
      let msg;
      try { msg = JSON.parse(event.data); } catch { return; }
      handleServerMessage(msg);
    });
  }

  function handleServerMessage(msg) {
    // ── Initial history load ────────────────────────────────────────────────
    if (msg.type === 'cf_agent_chat_messages') {
      renderHistory(msg.messages || []);
      return;
    }

    // ── Streaming response chunks ───────────────────────────────────────────
    if (msg.type === 'cf_agent_use_chat_response') {
      // Only process chunks for the request we sent
      if (msg.id !== currentReqId) return;

      if (msg.error === true) {
        if (!currentBubble) startAgentBubble();
        currentBubble.textContent = 'Error: ' + (msg.body || 'unknown error');
        finishStream();
        return;
      }

      if (typeof msg.body === 'string' && msg.body.length > 0) {
        processStreamChunk(msg.body);
      }

      if (msg.done === true) {
        // Flush any remaining buffer
        if (streamBuffer.trim()) processStreamChunk('\n');
        finishStream();
      }
      return;
    }
  }

  // ── History rendering ───────────────────────────────────────────────────────
  const renderedIds = new Set();

  function renderHistory(messages) {
    for (const msg of messages) {
      if (renderedIds.has(msg.id)) continue;
      renderedIds.add(msg.id);

      if (msg.role === 'user') {
        const text = extractText(msg);
        if (text) appendBubble('user', 'You', text);
      } else if (msg.role === 'assistant') {
        const text = extractText(msg);
        if (text) appendBubble('agent', 'Zero Trust Agent', text);
      }
    }
  }

  function extractText(msg) {
    if (Array.isArray(msg.parts)) {
      return msg.parts.filter(p => p.type === 'text').map(p => p.text).join('');
    }
    return typeof msg.content === 'string' ? msg.content : '';
  }

  // ── Send message ────────────────────────────────────────────────────────────
  function sendMessage(text) {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;

    // Build a UIMessage the way @cloudflare/ai-chat expects
    const userMsg = {
      id:    'msg-' + Date.now() + '-' + Math.random().toString(36).slice(2),
      role:  'user',
      content: text,
      parts: [{ type: 'text', text }],
    };

    // All messages sent so far (history) + new user message
    // The agent persists state, so we only need to send the new message;
    // the agent appends it to its stored history.
    currentReqId = 'req-' + Date.now() + '-' + Math.random().toString(36).slice(2);
    streaming    = true;

    ws.send(JSON.stringify({
      type: 'cf_agent_use_chat_request',
      id:   currentReqId,
      init: {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: [userMsg] }),
      },
    }));
  }

  // ── Form submit ─────────────────────────────────────────────────────────────
  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const text = inputEl.value.trim();
    if (!text || streaming) return;

    appendBubble('user', 'You', text);
    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;
    setStatus('Agent is thinking…');
    currentBubble = null;

    sendMessage(text);
  });

  // Auto-grow textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
  });

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      form.dispatchEvent(new Event('submit'));
    }
  });

  // ── Boot ────────────────────────────────────────────────────────────────────
  connect();
</script>
</body>
</html>
